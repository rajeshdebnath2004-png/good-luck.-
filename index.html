<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Wishes For You!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Pink color background with a cute cat image overlay */
            background: linear-gradient(rgba(255, 182, 193, 0.6), rgba(255, 105, 180, 0.6)), 
                        url('https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: #d1417a;
            font-size: 24px;
            margin-bottom: 10px;
        }
        h2 {
            color: #ff6b8b;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        p {
            font-size: 16px;
            color: #4a4a4a;
            line-height: 1.6;
            margin-bottom: 30px;
            background: #fff0f3;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff6b8b;
        }
        /* Music Player Styling */
        audio {
            width: 100%;
            border-radius: 30px;
            background: #f1f3f4;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>✨ Special Message ✨</h1>
        <h2>Best wishes for your future!</h2>
        
        <!-- নিচের <p> ট্যাগের ভেতরের লেখাটি কেটে আপনার নিজের মেসেজটি লিখুন -->
        <p>এখানে আপনার মনের মতো সুন্দর একটি মেসেজ টাইপ করে দিন। আপনি যা লিখতে চান তা এখানেই দেখাবে।</p>
        
        <!-- Audio Player (Play Button) -->
        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

</body>
</html>
