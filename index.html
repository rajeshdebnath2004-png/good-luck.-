<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Moments</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* পাহাড়, গাছ, আকাশ এবং রিল্যাক্স করার দারুণ একটি ব্যাকগ্রাউন্ড ইমেজ */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { color: #2c3e50; font-size: 26px; margin-bottom: 10px; }
        h2 { color: #27ae60; font-size: 18px; margin-bottom: 20px; }
        p { 
            font-size: 16px; color: #34495e; line-height: 1.6; 
            margin-bottom: 25px; background: rgba(255, 255, 255, 0.5); 
            padding: 15px; border-radius: 15px; 
        }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>✨ Peace & Calm ✨</h1>
        <h2>Relaxing time for your future!</h2>
        
        <p>পাহাড়ের কোল ঘেঁষে শান্ত আকাশ আর প্রকৃতির মাঝে একটু রিল্যাক্স করার মুহূর্ত। আপনার আগামী দিনগুলোও যেন এমন সুন্দর আর শান্তিময় হয়।</p>
        
        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
